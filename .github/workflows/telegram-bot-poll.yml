name: Telegram Bot Poll

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Restore offset
        id: cache-offset
        uses: actions/cache@v4
        with:
          path: /tmp/bot_offset.txt
          key: bot-offset-${{ github.run_id }}
          restore-keys: bot-offset-

      - name: Check for URLs and rewrite
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: node scripts/rewrite-bot.js --once

      - name: Commit drafts
        run: |
          git config user.name "opencode"
          git config user.email "opencode@ortopednn.ru"
          git add data/drafts/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "draft: article rewrite from bot"

      - name: Push changes
        run: git push

      - name: Deploy drafts to stomatolog test site
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          for f in data/drafts/*.astro; do
            [ -f "$f" ] || continue
            slug=$(basename "$f" .astro)
            content=$(base64 -w0 < "$f")
            existing=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/vpcea2s1r/stomatolog/contents/src/pages/blog/${slug}.astro" \
              | jq -r '.sha // empty')
            if [ -n "$existing" ]; then
              resp=$(curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/vpcea2s1r/stomatolog/contents/src/pages/blog/${slug}.astro" \
                -d "{\"message\":\"draft: ${slug}\",\"content\":\"${content}\",\"sha\":\"${existing}\"}")
            else
              resp=$(curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/vpcea2s1r/stomatolog/contents/src/pages/blog/${slug}.astro" \
                -d "{\"message\":\"draft: ${slug}\",\"content\":\"${content}\"}")
            fi
            echo "→ stomatolog: $slug ($(echo "$resp" | jq -r '.commit.sha // "error"'))"
          done

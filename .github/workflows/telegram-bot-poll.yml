name: Telegram Bot Poll

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Restore offset
        uses: actions/cache/restore@v4
        with:
          path: /tmp/bot_offset.txt
          key: bot-offset

      - name: Check for URLs and rewrite
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: node scripts/rewrite-bot.js --once

      - name: Commit drafts
        run: |
          git config user.name "opencode"
          git config user.email "opencode@ortopednn.ru"
          git add data/drafts/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "draft: article rewrite from bot"

      - name: Push changes
        run: git push

      - name: Save offset
        uses: actions/cache/save@v4
        with:
          path: /tmp/bot_offset.txt
          key: bot-offset

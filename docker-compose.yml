services:
  bot:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ortopednn-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - TELEGRAM_BOT_TOKEN=\
      - GH_TOKEN=\
      - GSC_CLIENT_ID=\
      - GSC_CLIENT_SECRET=\
      - GSC_REFRESH_TOKEN=\
      - YANDEX_OAUTH_TOKEN=\
      - YANDEX_CLIENT_ID=\
      - YANDEX_CLIENT_SECRET=\
      - DATA_DIR=/data
      - PORT=3000
      - TZ=Europe/Moscow
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    volumes:
      - bot_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  n8n:
    image: n8nio/n8n:latest
    container_name: ortopednn-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_HOST=localhost
      - WEBHOOK_URL=http://94.183.155.147:5678/
      - N8N_ENCRYPTION_KEY=\
      - TZ=Europe/Moscow
    volumes:
      - n8n_data:/home/node/.n8n
    labels:
      - "com.ortopednn.description=n8n workflow orchestrator"

  admin:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ortopednn-admin
    command: ["node", "admin/app.js"]
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - ADMIN_PORT=3001
      - GH_TOKEN=\
      - GSC_CLIENT_ID=\
      - GSC_CLIENT_SECRET=\
      - GSC_REFRESH_TOKEN=\
      - YANDEX_OAUTH_TOKEN=\
      - YANDEX_CLIENT_ID=\
      - YANDEX_CLIENT_SECRET=\
      - VK_ACCESS_TOKEN=\
      - OK_ACCESS_TOKEN=\
      - OK_APPLICATION_KEY=\
      - DATA_DIR=/data
      - ADMIN_JWT_SECRET=\
      - TZ=Europe/Moscow
    volumes:
      - bot_data:/data
    depends_on:
      bot:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot_data:
  n8n_data: